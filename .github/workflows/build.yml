name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 360  # Added timeout
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
            name: "Ubuntu Latest GCC",
            os: ubuntu-latest,
            cc: "gcc",
            cxx: "g++",
            parallel: "$(nproc)",
            # x86-64-v3: AVX2 + FMA + BMI + BMI2 (Intel Haswell 2013+, AMD Zen1 2017+).
            # All GitHub-hosted ubuntu-latest runners (Azure Xeon Platinum 8370C / Ice Lake)
            # support this level.  Fixed string keeps ccache keys stable across runner hosts.
            arch_flags: "-march=x86-64-v3 -mtune=generic"
          }
          - {
            name: "macOS Latest Clang",
            os: macos-latest,
            cc: "clang",
            cxx: "clang++",
            parallel: "$(sysctl -n hw.ncpu)",
            # GitHub macos-15 runners use Apple M1 (arm64).  -mcpu=apple-m1 enables
            # all M1 ISA extensions (NEON, SVE, SHA3, AES) without runtime probing.
            # M1-compiled code runs unchanged on M2/M3 (AArch64 is backward-compatible),
            # so this flag remains correct if GitHub upgrades to newer Apple Silicon.
            arch_flags: "-mcpu=apple-m1"
          }
#          - {
#            name: "Windows Latest MSVC",
#            os: windows-latest,
#            cc: "cl",
#            cxx: "cl",
#            parallel: "$env:NUMBER_OF_PROCESSORS"
#          }

    steps:
      - uses: actions/checkout@v5

      - name: Extract BRAINSTools version
        id: btversion
        shell: bash
        run: |
          # Parse VERSION from the project() call in CMakeLists.txt, e.g. "VERSION 5.8.0"
          VERSION=$(grep -m1 '^ *VERSION [0-9]' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          MAJOR_MINOR=$(echo "${VERSION}" | cut -d. -f1,2)
          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "BRAINSTools version: ${VERSION}  (MAJOR.MINOR: ${MAJOR_MINOR})"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Free Disk Space (Ubuntu)
        if: matrix.config.os == 'ubuntu-latest'
        uses: BRAINSia/free-disk-space@v2
        with:
          removalmode: "rmz"
          # BRAINSTools SuperBuild builds ITK, ANTs, SEM, TBB, and the inner
          # BRAINSTools tools.  On ubuntu-latest (~14 GB free by default) the
          # full build consumes 8-12 GB.  Freeing pre-installed language
          # runtimes and unused tool-cache entries recovers 15-20 GB, ensuring
          # the build never runs out of disk space.
          #
          # TIME_REPORT for this action on ubuntu-latest (approximate):
          #   swap-storage  |  0 s  | 4.0 GiB freed
          #   haskell       | 10 s  | 6.2 GiB freed
          #   dotnet        | 27 s  | 3.3 GiB freed
          #   tool-cache    | 90 s  | 5.3 GiB freed
          #   mandb         |  2 s  | speeds apt-get (no man pages in CI)
          swap-storage:   "true"
          haskell:        "true"
          dotnet:         "true"
          docker-images:  "false"  # Too slow (~80 s) for only 3.4 GiB
          tool-cache:     "true"
          android:        "false"  # Too slow (~300 s) for only 8.8 GiB
          large-packages: "false"  # Too slow for marginal gain in this build
          mandb:          "true"

      - name: Install Dependencies (Ubuntu)
        if: matrix.config.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - name: Install Dependencies (macOS)
        if: matrix.config.os == 'macos-latest'
        run: |
          brew install ninja ccache

      - name: Install Dependencies (Windows)
        if: matrix.config.os == 'windows-latest'
        run: |
          choco install ninja ccache --yes

      - name: Configure ccache
        shell: bash
        run: |
          echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"       >> "$GITHUB_ENV"
          echo "CCACHE_COMPILERCHECK=content"             >> "$GITHUB_ENV"
          echo "CCACHE_NOHASHDIR=true"                    >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=pch_defines,time_macros" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=${{ runner.temp }}/ccache"     >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=5G"                        >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESSLEVEL=1"                   >> "$GITHUB_ENV"

      - name: Restore compiler cache
        id: restore-ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/ccache
          key: ccache-v1-${{ runner.os }}-${{ matrix.config.cxx }}-${{ github.sha }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-${{ matrix.config.cxx }}-

      - name: Show ccache config and maintenance
        shell: bash
        run: |
          ccache --zero-stats
          ccache --evict-older-than 7d
          ccache --show-config

      - name: Restore ExternalData object store
        id: restore-externaldata
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/ExternalData
          # Key includes MAJOR.MINOR so the cache survives patch releases
          # (bug fixes that don't add new test data) but is invalidated when
          # a new minor version introduces new test data hashes.
          # github.sha makes the save key unique so new hashes added within
          # a minor version are accumulated across runs.
          key: ExternalData-BRAINSTools-v${{ steps.btversion.outputs.major_minor }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ExternalData-BRAINSTools-v${{ steps.btversion.outputs.major_minor }}-${{ runner.os }}-

      - name: Set ExternalData_OBJECT_STORES
        shell: bash
        run: |
          # BRAINSToolsExternalData.cmake reads this env var at cmake configure
          # time and adds it as the first search path for ExternalData objects.
          # Objects already in the store are used directly; missing ones are
          # downloaded to ExternalData_BINARY_ROOT then copied back below.
          mkdir -p "${{ runner.temp }}/ExternalData"
          echo "ExternalData_OBJECT_STORES=${{ runner.temp }}/ExternalData" >> "$GITHUB_ENV"

      - name: Restore SuperBuild EP cache
        id: restore-ep
        uses: actions/cache/restore@v5
        with:
          # Cache the EP install prefix (compiled headers + libraries) and the
          # ExternalProject done-stamp directories.  With the done stamps
          # present, ExternalProject_Add skips all steps (download, configure,
          # build, install) for each cached EP.  The install prefix provides
          # the actual .so/.a files needed by the inner BRAINSTools build.
          #
          # Paths cached:
          #   build/BRAINSTools-Release-<version>/  — EP install prefix
          #     Contains: bin/ lib/ include/ share/  (~400-800 MB)
          #   build/<EP>-prefix/src/<EP>-stamp/      — done stamps (~KB each)
          #
          # NOT cached (too large and regenerated by ccache):
          #   build/<EP>-Release-build/  — EP intermediate build trees
          #   build/BRAINSTools-Release-EPRelease-build/  — inner build
          path: |
            build/BRAINSTools-Release-${{ steps.btversion.outputs.version }}/
            build/ITKv5-prefix/src/ITKv5-stamp/
            build/ANTs-prefix/src/ANTs-stamp/
            build/SlicerExecutionModel-prefix/src/SlicerExecutionModel-stamp/
            build/tbb-prefix/src/tbb-stamp/
            build/zlib-prefix/src/zlib-stamp/
          # Key changes when any SuperBuild EP definition or the top-level
          # CMakeLists.txt (which sets version + EP tags) changes.  On cache
          # miss the full SuperBuild runs; on hit only the inner build runs.
          key: superbuild-ep-v1-${{ runner.os }}-${{ matrix.config.cxx }}-${{ hashFiles('CMakeLists.txt', 'SuperBuild/**', 'Common.cmake') }}
          restore-keys: |
            superbuild-ep-v1-${{ runner.os }}-${{ matrix.config.cxx }}-

      - name: Remove stale EP git-clone sentinels
        shell: bash
        run: |
          # *-gitclone-lastrun.txt tells CMake "git clone already ran — skip
          # it".  When the EP stamp cache is restored, these sentinels are
          # present but the actual source trees are not (we don't cache them).
          # CMake then skips the clone, leaving an empty source directory, and
          # the subsequent update step fails with "not a git repository".
          # Deleting the sentinels forces a fresh (shallow) clone on every
          # run; CMake then finds the configure/build/install stamps and skips
          # those expensive steps.  The re-clone cost is seconds per EP.
          find build -name "*-gitclone-lastrun.txt" -delete 2>/dev/null || true

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.config.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_STANDARD:STRING=17 \
            -DCMAKE_C_FLAGS="${{ matrix.config.arch_flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.config.arch_flags }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEXTERNAL_PROJECT_BUILD_TYPE:STRING=Release \
            -DBUILD_TESTING=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DBRAINSTools_REQUIRES_VTK=OFF \
            -DUSE_BRAINSABC:BOOL=OFF \
            -DUSE_BRAINSCreateLabelMapFromProbabilityMaps:BOOL=OFF \
            -DUSE_BRAINSDWICleanup:BOOL=OFF \
            -DUSE_BRAINSInitializedControlPoints:BOOL=OFF \
            -DUSE_BRAINSLabelStats:BOOL=OFF \
            -DUSE_BRAINSLandmarkInitializer:BOOL=OFF \
            -DUSE_BRAINSMultiModeSegment:BOOL=OFF \
            -DUSE_BRAINSMultiSTAPLE:BOOL=OFF \
            -DUSE_BRAINSMush:BOOL=OFF \
            -DUSE_BRAINSPosteriorToContinuousClass:BOOL=OFF \
            -DUSE_BRAINSResample:BOOL=ON \
            -DUSE_BRAINSROIAuto:BOOL=OFF \
            -DUSE_BRAINSSnapShotWriter:BOOL=OFF \
            -DUSE_BRAINSStripRotation:BOOL=OFF \
            -DUSE_BRAINSTransformConvert:BOOL=OFF \
            -DUSE_ConvertBetweenFileFormats:BOOL=OFF \
            -DUSE_ImageCalculator:BOOL=OFF \
            -DUSE_ReferenceAtlas:BOOL=OFF \
            -DBRAINSTools_BUILD_DICOM_SUPPORT:BOOL=OFF \
            -DUSE_DWIConvert:BOOL=OFF

#           Disable testing that requires VTK
#           -DBRAINSTools_BUILD_DICOM_SUPPORT:BOOL=OFF \
#           -DUSE_DWIConvert:BOOL=OFF

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel ${{ matrix.config.parallel }}

      - name: Save SuperBuild EP cache
        if: steps.restore-ep.outputs.cache-hit != 'true' && !cancelled()
        uses: actions/cache/save@v5
        with:
          path: |
            build/BRAINSTools-Release-${{ steps.btversion.outputs.version }}/
            build/ITKv5-prefix/src/ITKv5-stamp/
            build/ANTs-prefix/src/ANTs-stamp/
            build/SlicerExecutionModel-prefix/src/SlicerExecutionModel-stamp/
            build/tbb-prefix/src/tbb-stamp/
            build/zlib-prefix/src/zlib-stamp/
          key: superbuild-ep-v1-${{ runner.os }}-${{ matrix.config.cxx }}-${{ hashFiles('CMakeLists.txt', 'SuperBuild/**', 'Common.cmake') }}

      - name: Save compiler cache
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/ccache
          key: ccache-v1-${{ runner.os }}-${{ matrix.config.cxx }}-${{ github.sha }}

      - name: ccache stats
        if: always()
        shell: bash
        run: ccache --show-stats

      - name: Populate ExternalData object store from build output
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          # ExternalData downloads objects into ExternalData_BINARY_ROOT/Objects/
          # (set in CMake/BRAINSToolsExternalData.cmake as CMAKE_BINARY_DIR/ExternalData).
          # Copy any newly downloaded objects back to the persistent object store
          # so they are available on the next run without re-downloading.
          BINARY_OBJECTS="${GITHUB_WORKSPACE}/build/BRAINSTools-Release-EPRelease-build/ExternalData/Objects"
          if [ -d "${BINARY_OBJECTS}" ]; then
            echo "Syncing new ExternalData objects to store..."
            rsync -a --ignore-existing "${BINARY_OBJECTS}/." "${{ runner.temp }}/ExternalData/" 2>/dev/null || true
            echo "Object store contents:"
            find "${{ runner.temp }}/ExternalData" -type f | wc -l
          else
            echo "No ExternalData binary objects directory found (no test data downloaded this run)."
          fi

      - name: Save ExternalData object store
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/ExternalData
          # SHA-keyed save always writes a new entry; restore-keys fallback
          # finds the most recent entry for this MAJOR.MINOR + OS combination.
          key: ExternalData-BRAINSTools-v${{ steps.btversion.outputs.major_minor }}-${{ runner.os }}-${{ github.sha }}

      - name: Clean build/BRAINSTools-Release-EPRelease-build
        working-directory: build/BRAINSTools-Release-EPRelease-build
        shell: bash
        run: ninja clean

      - name: ExperimentalStart
        working-directory: build/BRAINSTools-Release-EPRelease-build
        shell: bash
        run: ctest -D ExperimentalStart

      - name: ExperimentalConfigure
        working-directory: build/BRAINSTools-Release-EPRelease-build
        shell: bash
        run: ctest -D ExperimentalConfigure

      - name: ExperimentalBuild
        working-directory: build/BRAINSTools-Release-EPRelease-build
        shell: bash
        run: ctest -D ExperimentalBuild -j ${{ matrix.config.parallel }}

      - name: ExperimentalTest
        working-directory: build/BRAINSTools-Release-EPRelease-build
        shell: bash
        run: ctest -D ExperimentalTest --schedule-random --output-on-failure -j ${{ matrix.config.parallel }}

      - name: ExperimentalSubmit
        working-directory: build/BRAINSTools-Release-EPRelease-build
        shell: bash
        run: ctest -D ExperimentalSubmit

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: always()  # Changed from failure() to always()
        with:
          name: build-logs-${{ matrix.config.name }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/Temporary/LastTest.log
